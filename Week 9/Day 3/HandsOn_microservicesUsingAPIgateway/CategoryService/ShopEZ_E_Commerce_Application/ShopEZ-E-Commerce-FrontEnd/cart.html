
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - ShopEZ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="cart-page">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
           <a class="navbar-brand fw-bold" href="index.html">ShopEZ-E-Commerce</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">

                     <li class="nav-item me-3">
                        <a href="cart.html" class="btn btn-outline-primary">
                            Cart (<span id="cartCount">0</span>)
                        </a>
                    </li>

                    <li class="nav-item me-2">
                        <a class="btn btn-warning me-2 " href="index.html">Home</a>
                    </li>

                    <li class="nav-item me-2">
                        <a class="btn btn-warning me-2 " href="products.html">Products</a>
                    </li>

                   
                </ul>
            </div>
        </div>
    </nav>

    <!-- Cart Section -->
    <div class="container mt-5 mb-5">
        <div class="row">
            
            <!-- Cart Table -->
            <div class="col-lg-8">
                <div class="card shadow border-0 rounded-4 p-4 cart-card">
                    <h2 class="text-center mb-4">Shopping Cart</h2>

                    <div class="table-responsive">
                        <table class="table table-bordered align-middle text-center">
                            <thead class="table-dark">
                                <tr>
                                    <th>Product</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Total Price</th>
                                    <th>Action</th>
                                </tr>
                            </thead>

                            <tbody id="cartData">
                                <!-- Dynamic rows from cart.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4 mt-4 mt-lg-0">
                <div class="card shadow border-0 rounded-4 p-4 summary-card">
                    <h4 class="mb-4 text-center">Order Summary</h4>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Total Items</span>
                        <span id="itemCount">0</span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Subtotal</span>
                        <span class="text-primary"><span id="subtotal">0</span></span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Discount</span>
                        <span class="text-danger">- <span id="discount">0</span></span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Delivery Charge</span>
                        <span class="text-info"> + <span id="deliveryCharge"> 0 </span> </span> 
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Grand Total</span>
                        <span class="text-success"> =  <span id="total"> 0 </span></span>
                    </div>

                    <button class="btn btn-success w-100 mt-4" id="checkoutBtn">
                        Proceed to CheckOut
                    </button>

                    <a href="products.html" class="btn btn-primary w-100 mt-2">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-4 mt-4 w-100">
        <p class="mb-1">&copy; 2026 ShopEZ E-Commerce. All Rights Reserved.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

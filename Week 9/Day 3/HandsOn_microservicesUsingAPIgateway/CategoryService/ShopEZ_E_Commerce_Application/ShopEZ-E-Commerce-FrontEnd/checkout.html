
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopEZ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="checkout-page">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">ShopEZ-E-Commerce</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item me-2">
                        <a class="btn btn-outline-primary me-2 " href="checkout.html">CheckOut</a>
                    </li>
                    
                    <li class="nav-item me-2">
                        <a class="btn btn-warning me-2 " href="index.html">Home</a>
                    </li>

                    <li class="nav-item me-2">
                        <a class="btn btn-warning me-2 " href="products.html">Products</a>
                    </li>

                   <li class="nav-item me-2">
                        <a class="btn btn-warning me-2 " href="cart.html">Cart</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Checkout Section -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            
            <!-- Billing Details -->
            <div class="col-lg-7">
                <div class="card shadow border-0 rounded-4 p-4 checkout-card">
                    <h2 class="mb-4" id="c1">Billing Details</h2>

                    <form id="checkoutForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="fullName"  placeholder="Enter Your Full Name"  required>
                                <small class="text-danger error" id="nameError"></small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="example01@gmail.com"   required>
                                <small class="text-danger error" id="emailError"></small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" class="form-control" id="phone" placeholder="Enter your 10 digits Phone Number" required>
                                <small class="text-danger error" id="phoneError"></small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">City</label>
                                <input type="text" class="form-control" id="city" placeholder="Enter Your City Name"required>
                                <small class="text-danger error" id="cityError"></small>
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" id="address" rows="3" placeholder="Enter Your Home Address"required></textarea>
                                <small class="text-danger error" id="addressError"></small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Pincode</label>
                                <input type="text" class="form-control" id="pincode" placeholder="Enter Your Home 6 Digits Pincode Number" required>
                                <small class="text-danger error" id="pincodeError"></small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Payment Method</label>
                                <select class="form-select" id="paymentMethod" placeholder="Choose Payment Option" required>
                                    <option value="">Select Payment Method</option>
                                    <option value="Cash on Delivery">Cash on Delivery</option>
                                    <option value="UPI">UPI</option>
                                    <option value="Debit Card">Debit Card</option>
                                    <option value="Credit Card">Credit Card</option>
                                </select>
                                <small class="text-danger error" id="paymentError"></small>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 mt-3">
                            Place Order
                        </button>
                    </form>
                </div>
            </div> 
        </div>
    </div>     

  <!-- Footer -->
<footer class="bg-dark text-light text-center py-4 mt-4 w-100">
    <div class="container-fluid text-center">
        &copy; 2026 ShopEZ E-Commerce. All Rights Reserved.
    </div>
</footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

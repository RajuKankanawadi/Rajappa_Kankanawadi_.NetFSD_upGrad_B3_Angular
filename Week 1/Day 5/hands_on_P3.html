<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>
</head>

<body style="background-color: antiquewhite;"> 

    <h2> Counter Application</h2>

    <h3 id="counterValue">0</h3>

    <button style="background-color: antiquewhite;" id="incrementBtn">Increment</button>
    <button style="background-color: rgb(198, 65, 81);" id="resetBtn">Reset</button>

    <script>

        
        var counter = 0;

      
        document.getElementById("incrementBtn")
                .addEventListener("click", function() {
                    incrementCounter(1);  
                });

        document.getElementById("resetBtn")
                .addEventListener("click", resetCounter);


     
        function incrementCounter(step) {

           
            counter = counter + step;

           
            document.getElementById("counterValue").innerHTML = counter;
        }


        function resetCounter() {

           
            counter = 0;

            document.getElementById("counterValue").innerHTML = counter;
        }

    </script>

</body>
</html>

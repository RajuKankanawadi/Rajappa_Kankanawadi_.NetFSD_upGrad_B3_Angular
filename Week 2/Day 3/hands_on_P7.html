<!DOCTYPE html>
<html>
<head>
    <title>Mini Product Search App</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: khaki;
        }
        input {
            padding: 8px;
            width: 250px;
            margin-bottom: 15px;
            background-color: rgb(139, 151, 161);
            color: red
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 8px;
            border: 1px solid #976969;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .no-results {
            color: rgb(255, 0, 217);
            font-weight: bold;
        }
        h2 {
            color: rgb(73, 7, 143);
            text-align: center;
             font-family: 'Times New Roman';
        }
    </style>
</head>
<body>

<h2>Mini Product Search</h2>

<input type="text" id="searchBox" placeholder="Search products...">

<ul id="productList"></ul>

<script>

const state = {
    products: [
        "Laptop",
        "Mobile",
        "Headphones",
        "Keyboard",
        "Mouse",
        "Smart Watch",
        "Camera",
        "Speaker",
        "Tablet",
        "Charger"
    ],

    filteredProducts: []
};

const renderProducts = (products) => {
    const list = document.getElementById("productList");
    list.innerHTML = "";

    if (products.length === 0) {
        list.innerHTML = `<li class="no-results">No Results Found</li>`;
        return;
    }

    products.forEach(product => {
        const li = document.createElement("li");
        li.textContent = product;
        list.appendChild(li);
    });
};

const filterProducts = (searchText) => {
    state.filteredProducts = state.products.filter(product =>
        product.toLowerCase().includes(searchText.toLowerCase())
    );

    renderProducts(state.filteredProducts);
};

const handleSearch = (event) => {
    filterProducts(event.target.value);
};

document.getElementById("productList").addEventListener("click", function(event) {
    if (event.target.tagName === "LI") {
        alert("You selected: " + event.target.textContent);
    }
});

document.getElementById("searchBox").addEventListener("input", handleSearch);


state.filteredProducts = state.products;
renderProducts(state.products);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Interactive Feedback</title>
    <style>

        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: rgb(147, 117, 79);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: rgb(154, 179, 179);
        }

        #message {
            margin-top: 20px;
            font-size: 25px;
            color: rgb(21, 7, 89);
        }

        #feedbackBtn {
            
            color: rgb(30, 27, 215);

        }
    </style>
</head>
<body>

    <h2 style="color: rgb(147, 36, 141);">Feedback Page</h2>

    <button id="feedbackBtn">Submit Feedback</button>

    <div id="message"></div>

    <script>
        
        let button = document.getElementById("feedbackBtn");
        let messageDiv = document.getElementById("message");

 
        button.addEventListener("click", function () {
            messageDiv.textContent = "Thank you! Your feedback has been submitted successfully.";
        });
    </script>

</body>
</html>

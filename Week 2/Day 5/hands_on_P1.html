<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Event Management Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">College Dashboard</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Events</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


<div class="container my-5">

  <div class="row g-4">


    <div class="col-12 col-md-8 col-lg-9">
      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Upcoming Events</h5>
          <button class="btn btn-success btn-sm"
                  data-bs-toggle="modal"
                  data-bs-target="#addEventModal">
            + Add Event
          </button>
        </div>

        <div class="card-body">
          <ul class="list-group" id="eventList">
            <li class="list-group-item">Tech Fest - 20 March 2026</li>
            <li class="list-group-item">Sports Meet - 5 April 2026</li>
            <li class="list-group-item">Cultural Day - 15 April 2026</li>
          </ul>
        </div>
      </div>
    </div>


    <div class="col-12 col-md-4 col-lg-3">
      <div class="card shadow-sm text-center">
        <div class="card-body">
          <h6>Total Events</h6>
          <h2 id="eventCount">3</h2>
        </div>
      </div>
    </div>

  </div>
</div>


<div class="modal fade" id="addEventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add New Event</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="eventForm" class="needs-validation" novalidate>

          <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" class="form-control" id="eventName" required>
            <div class="invalid-feedback">
              Please enter event name.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Event Date</label>
            <input type="date" class="form-control" id="eventDate" required>
            <div class="invalid-feedback">
              Please select event date.
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Add Event
          </button>

        </form>
      </div>

    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>
const form = document.getElementById("eventForm");
const eventList = document.getElementById("eventList");
const eventCount = document.getElementById("eventCount");

form.addEventListener("submit", function (e) {
    e.preventDefault();

    if (!form.checkValidity()) {
        form.classList.add("was-validated");
        return;
    }

    const name = document.getElementById("eventName").value;
    const date = document.getElementById("eventDate").value;

    const li = document.createElement("li");
    li.className = "list-group-item";
    li.textContent = name + " - " + date;

    eventList.appendChild(li);

  
    eventCount.textContent = eventList.children.length;

    form.reset();
    form.classList.remove("was-validated");


    const modal = bootstrap.Modal.getInstance(document.getElementById("addEventModal"));
    modal.hide();
});
</script>

</body>
</html>

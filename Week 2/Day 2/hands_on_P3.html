<!DOCTYPE html>

<head>
    <title>Emp Filter Sys</title>

    <style>
        body {
            font-family:'Courier New' ;
            padding: 20px;
            background-color: cadetblue;
        }

        select, button {
            padding: 8px;
            margin-right: 10px;
            background-color: burlywood;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            width: 700px;
            background-color: beige;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #fac5c5;
        }

       
    </style>
</head>
<body>

<h2>Employee Filter System</h2>

<select id="jobSelect">
    <option value="All">All Employees</option>
    <option value="Manager">Manager</option>
    <option value="Salesman">Salesman</option>
    <option value="Clerk">Clerk</option>
</select>


<button onclick="showEmployees()">Show Emps</button>


<div id="output"></div>

<script>


    let employees = [
        { empno: 101, name: "Ravi", job: "Manager", salary: 50000 },
        { empno: 102, name: "Sita", job: "Salesman", salary: 25000 },
        { empno: 103, name: "Amit", job: "Clerk", salary: 17000 },
        { empno: 104, name: "John", job: "Manager", salary: 55000 },
        { empno: 105, name: "Priya", job: "Salesman", salary: 29000 },
        { empno: 106, name: "Ram", job: "Manager", salary: 45000 },
        { empno: 107, name: "Shiva", job: "Salesman", salary: 27000 },
        { empno: 108, name: "Kiran", job: "Clerk", salary: 15000 }
    ];

    function showEmployees() {

    
        let selectedJob = document.getElementById("jobSelect").value;

    
        let filteredEmployees;

        if (selectedJob === "All") {
            filteredEmployees = employees; 
        } else {
            filteredEmployees = employees.filter(emp => emp.job === selectedJob);
        }

        if (filteredEmployees.length === 0) {
            document.getElementById("output").innerHTML =
                "<p class='no-data'>No employees found for selected job.</p>";
            return;
        }

        let rows = filteredEmployees.map(emp => `
            <tr>
                <td>${emp.empno}</td>
                <td>${emp.name}</td>
                <td>${emp.job}</td>
                <td>${emp.salary}</td>
            </tr>
        `).join("");

        document.getElementById("output").innerHTML = `
            <table>
            <thead>
                <tr>
                    <th>Emp No</th>
                    <th>Name</th>
                    <th>Job</th>
                    <th>Salary</th>
                </tr>
            </thead>
                ${rows}
            </table>
        `;
    }

</script>

</body>
</html>

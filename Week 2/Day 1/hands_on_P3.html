<!DOCTYPE html>
<html>
<head>
    <title>Location Logger</title>
</head>

<body onload="loadHistory()" style="background-color: rgb(219, 209, 209);">

    <h2>Location-Based Logger</h2>

    <button onclick="getLocation()" style="background-color: rgb(178, 234, 234);">Get My Location</button>

    <h3 style="color: #ef4646;">Current Location:</h3>
    <p id="locationResult"></p>

    <h3 style="color: rgb(174, 99, 7);">Last 5 Locations:</h3>
    <ul id="historyList"></ul>

    <script>

        function getLocation() {

            if (navigator.geolocation) {

                navigator.geolocation.getCurrentPosition(
                    successCallback,
                    errorCallback,
                    { timeout: 10000 }
                );

            } else {
                document.getElementById("locationResult").innerHTML =
                    "Geolocation not supported by this browser.";
            }
        }

      
        function successCallback(position) {

            let latitude = position.coords.latitude;
            let longitude = position.coords.longitude;

            document.getElementById("locationResult").innerHTML =
                "Latitude: " + latitude + "<br>Longitude: " + longitude;

            let locationData = {
                lat: latitude,
                long: longitude,
                time: new Date().toLocaleString()
            };

            let history = localStorage.getItem("locationHistory");

            let locations = history ? JSON.parse(history) : [];


            locations.unshift(locationData);

            if (locations.length > 5) {
                locations = locations.slice(0, 5);
            }

            localStorage.setItem("locationHistory", JSON.stringify(locations));

            loadHistory();
        }

        function errorCallback(error) {

            let message = "";

            switch (error.code) {
                case error.PERMISSION_DENIED:
                    message = "Permission denied by user.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = "Location information unavailable.";
                    break;
                case error.TIMEOUT:
                    message = " Request timed out.";
                    break;
                default:
                    message = " Unknown error occurred.";
            }

            document.getElementById("locationResult").innerHTML = message;
        }

        function loadHistory() {

            let history = localStorage.getItem("locationHistory");

            let locations = history ? JSON.parse(history) : [];

            let list = document.getElementById("historyList");
            list.innerHTML = "";

            locations.forEach(function(item) {
                let li = document.createElement("li");
                li.innerHTML = 
                    "Latitude: " + item.lat +
                    ", Longitude: " + item.long +
                    " (" + item.time + ")";
                list.appendChild(li);
            });
        }

    </script>

</body>
</html>

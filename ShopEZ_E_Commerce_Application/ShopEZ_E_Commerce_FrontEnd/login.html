<!DOCTYPE html>
<html>
<head>
    <title>Login - ShopEZ</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>


<body class="login-page d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="index.html">ShopEZ-E-Commerce</a>

        <div>
            <a href="products.html" class="btn btn-warning me-2">Products</a>

            <a href="cart.html" class="btn btn-warning me-2">
                Cart (<span id="cartCount">0</span>)
            </a>
        </div>
    </div>
</nav>

<!-- Login Section -->
<div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="row justify-content-center w-100">
        <div class="col-md-5">
            
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                
                <!-- Top Color Section -->
                <div class="bg-primary border-0 rounded-3 p-3">
                    <h2 class="text-center mb-3 fw-bold">Login</h2>
                </div>

                <!-- Form Section -->
                <div class="card-body p-4 bg-light">
                    <form id="loginForm">
                        
                        <div class="mb-5 text-danger " >
                            <label for="email" class="form-label fs-4 fw-bold">Email</label>
                            <input type="email" id="email" class="form-control rounded-3"
                                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                                placeholder="Enter Email: rajappa01@gmail.com" required>
                            <div class="invalid-feedback">Please enter a valid email.</div>
                        </div>

                        <div class="mb-5 text-danger">
                            <label for="password" class="form-label fs-4 fw-bold">Password</label>
                            <input type="password" id="password" class="form-control rounded-3"
                                placeholder="Enter Password" required minlength="8">
                            <div class="invalid-feedback">Password must be at least 8 characters.</div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 rounded-3 py-2 fs-4 fw-bold">
                            Submit
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-light text-center py-3 mt-auto">
    <p class="mb-0">&copy; 2026 ShopEZ E-Commerce. All Rights Reserved.</p>
</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/login.js"></script>
<script src="js/common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
